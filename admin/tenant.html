<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sentra - Data Tenant</title>
    <link rel="stylesheet" href="../css/Admin/tenant.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modal Tambah Tenant */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-box {
            background: #fff;
            border-radius: 14px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 26px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.25);
        }
        .modal-box h2 {
            margin: 0 0 18px;
            font-size: 1.25rem;
            color: #1EAD4C;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #334155;
        }
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="url"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #d6dce3;
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .checkbox-row { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
        .checkbox-row input { width: auto; }
        #previewTenantImg {
            display: none;
            margin-top: 8px;
            width: 100%;
            max-height: 140px;
            object-fit: cover;
            border-radius: 8px;
        }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }
        .btn-modal-cancel, .btn-modal-submit {
            padding: 9px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-modal-cancel { background: #eef1f4; color: #475569; }
        .btn-modal-submit { background: #1EAD4C; color: #fff; }
        .btn-modal-submit:hover { background: #189940; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-utensils"></i>
            <h2>Admin Sentra</h2>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="tenant.html" class="nav-item active">
                <i class="fas fa-store"></i> Data Tenant
            </a>
            <a href="produk.html" class="nav-item">
                <i class="fas fa-hamburger"></i> Data Produk
            </a>
            <a href="transaksi.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i> Data Transaksi
            </a>
            <a href="laporan.html" class="nav-item">
                <i class="fas fa-chart-line"></i> Laporan Penjualan
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="../index.html" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <h1>Manajemen Data Tenant</h1>
            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name">Super Admin</span>
                    <span class="user-role">Pengelola Sentra</span>
                </div>
                <div class="avatar">SA</div>
            </div>
        </header>

        <section class="table-section">
            <div class="table-header">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Cari nama tenant...">
                </div>
                <button class="btn-add" id="btnTambahTenant">
                    <i class="fas fa-plus"></i> Tambah Tenant
                </button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>No</th>
                            <th>Nama Tenant</th>
                            <th>Kategori</th>
                            <th>Rating</th>
                            <th>Harga Mulai</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tenantTableBody">
                        <!-- Diisi otomatis oleh admin.js dari data tenant (localStorage) -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Tambah Tenant -->
    <div class="modal-overlay" id="modalTambahTenant">
        <div class="modal-box">
            <h2><i class="fas fa-store"></i> Tambah Tenant Baru</h2>
            <form id="formTambahTenant">
                <div class="form-group">
                    <label for="inputTenantName">Nama Tenant</label>
                    <input type="text" id="inputTenantName" required placeholder="Contoh: Warung Nasi Bu Tini">
                </div>
                <div class="form-group">
                    <label for="inputTenantDesc">Deskripsi Singkat</label>
                    <textarea id="inputTenantDesc" placeholder="Ceritakan spesialisasi tenant ini..."></textarea>
                </div>

                <div class="form-group">
                    <label>Foto Tenant</label>
                    <input type="file" id="inputTenantFile" accept="image/*">
                    <input type="url" id="inputTenantImgUrl" placeholder="atau tempel URL gambar di sini" style="margin-top:6px;">
                    <img id="previewTenantImg" alt="Preview">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="inputTenantCategory">Kategori</label>
                        <select id="inputTenantCategory">
                            <option value="makanan">Makanan</option>
                            <option value="minuman">Minuman</option>
                            <option value="cemilan">Cemilan</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="inputTenantRating">Rating</label>
                        <input type="number" id="inputTenantRating" min="0" max="5" step="0.1" value="4.5">
                    </div>
                </div>

                <div class="form-group">
                    <label for="inputTenantPrice">Harga Mulai (Rp)</label>
                    <input type="number" id="inputTenantPrice" min="0" step="500" placeholder="Contoh: 15000">
                </div>

                <div class="checkbox-row">
                    <input type="checkbox" id="inputTenantIsPromo">
                    <label for="inputTenantIsPromo" style="margin:0;">Tandai sebagai tenant promo</label>
                </div>
                <div class="form-group">
                    <label for="inputTenantPromoBadge">Teks Badge Promo (opsional)</label>
                    <input type="text" id="inputTenantPromoBadge" placeholder="Contoh: Diskon 20%">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-modal-cancel" id="btnBatalTenant">Batal</button>
                    <button type="submit" class="btn-modal-submit">Simpan Tenant</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/shared-data.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
