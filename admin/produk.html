<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sentra - Data Produk</title>
    <link rel="stylesheet" href="../css/Admin/produk.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modal Tambah Produk */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.55);
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }
        .modal-box {
            background: #fff;
            border-radius: 14px;
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 24px 26px;
            box-shadow: 0 20px 45px rgba(0,0,0,0.25);
        }
        .modal-box h2 {
            margin: 0 0 18px;
            font-size: 1.25rem;
            color: #1EAD4C;
        }
        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 5px;
            color: #334155;
        }
        .form-group input[type="text"],
        .form-group input[type="number"],
        .form-group input[type="url"],
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 9px 11px;
            border: 1px solid #d6dce3;
            border-radius: 8px;
            font-size: 0.9rem;
            box-sizing: border-box;
            font-family: inherit;
        }
        .form-group textarea { resize: vertical; min-height: 60px; }
        .form-row { display: flex; gap: 12px; }
        .form-row .form-group { flex: 1; }
        .modal-actions {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 18px;
        }
        .btn-modal-cancel, .btn-modal-submit {
            padding: 9px 18px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.9rem;
        }
        .btn-modal-cancel { background: #eef1f4; color: #475569; }
        .btn-modal-submit { background: #1EAD4C; color: #fff; }
        .btn-modal-submit:hover { background: #189940; }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-utensils"></i>
            <h2>Admin Sentra</h2>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="tenant.html" class="nav-item">
                <i class="fas fa-store"></i> Data Tenant
            </a>
            <a href="produk.html" class="nav-item active">
                <i class="fas fa-hamburger"></i> Data Produk
            </a>
            <a href="transaksi.html" class="nav-item">
                <i class="fas fa-shopping-cart"></i> Data Transaksi
            </a>
            <a href="laporan.html" class="nav-item">
                <i class="fas fa-chart-line"></i> Laporan Penjualan
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="../index.html" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <h1>Data Produk & Menu</h1>
            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name">Super Admin</span>
                    <span class="user-role">Pengelola Sentra</span>
                </div>
                <div class="avatar">SA</div>
            </div>
        </header>

        <section class="table-section">
            <div class="table-header">
                <div class="filter-group">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Cari nama produk / tenant...">
                    </div>
                    <select class="filter-select">
                        <option value="">Semua Kategori</option>
                        <option value="makanan">Makanan</option>
                        <option value="minuman">Minuman</option>
                        <option value="cemilan">Cemilan</option>
                    </select>
                </div>
                <button class="btn-add" id="btnTambahProduk">
                    <i class="fas fa-plus"></i> Tambah Produk
                </button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID Produk</th>
                            <th>Nama Produk</th>
                            <th>Nama Tenant</th>
                            <th>Kategori</th>
                            <th>Harga Jual (Final)</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="produkTableBody">
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Tambah Produk -->
    <div class="modal-overlay" id="modalTambahProduk">
        <div class="modal-box">
            <h2><i class="fas fa-hamburger"></i> Tambah Produk Baru</h2>
            <form id="formTambahProduk">
                <div class="form-group">
                    <label for="inputProdukTenant">Tenant</label>
                    <select id="inputProdukTenant" required>
                        <option value="" disabled selected>-- Pilih Tenant --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="inputProdukName">Nama Produk</label>
                    <input type="text" id="inputProdukName" required placeholder="Contoh: Es Kopi Susu">
                </div>

                <div class="form-group">
                    <label for="inputProdukDesc">Deskripsi Singkat</label>
                    <textarea id="inputProdukDesc" placeholder="Deskripsi rasa/bahan produk..."></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="inputProdukCategory">Kategori</label>
                        <select id="inputProdukCategory">
                            <option value="makanan">Makanan</option>
                            <option value="minuman">Minuman</option>
                            <option value="cemilan">Cemilan</option>
                        </select>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="inputProdukHargaAsli">Harga Asli (Rp)</label>
                        <input type="number" id="inputProdukHargaAsli" min="0" step="500" placeholder="Contoh: 20000">
                    </div>
                    <div class="form-group">
                        <label for="inputProdukHargaJual">Harga Jual / Final (Rp)</label>
                        <input type="number" id="inputProdukHargaJual" min="0" step="500" required placeholder="Contoh: 18000">
                    </div>
                </div>

                <div class="form-group">
                    <label for="inputProdukImgUrl">URL Gambar (opsional)</label>
                    <input type="url" id="inputProdukImgUrl" placeholder="https://...">
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn-modal-cancel" id="btnBatalProduk">Batal</button>
                    <button type="submit" class="btn-modal-submit">Simpan Produk</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/shared-data.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>
