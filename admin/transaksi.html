<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Sentra - Data Transaksi</title>
    <link rel="stylesheet" href="../css/Admin/transaksi.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-utensils"></i>
            <h2>Admin Sentra</h2>
        </div>
        
        <nav class="sidebar-nav">
            <a href="dashboard.html" class="nav-item">
                <i class="fas fa-home"></i> Dashboard
            </a>
            <a href="tenant.html" class="nav-item">
                <i class="fas fa-store"></i> Data Tenant
            </a>
            <a href="produk.html" class="nav-item">
                <i class="fas fa-hamburger"></i> Data Produk
            </a>
            <a href="transaksi.html" class="nav-item active">
                <i class="fas fa-shopping-cart"></i> Data Transaksi
            </a>
            <a href="laporan.html" class="nav-item">
                <i class="fas fa-chart-line"></i> Laporan Penjualan
            </a>
        </nav>

        <div class="sidebar-footer">
            <a href="../index.html" class="btn-logout">
                <i class="fas fa-sign-out-alt"></i> Keluar
            </a>
        </div>
    </aside>

    <main class="main-content">
        <header class="content-header">
            <h1>Riwayat Transaksi</h1>
            <div class="user-profile">
                <div class="user-info">
                    <span class="user-name">Super Admin</span>
                    <span class="user-role">Pengelola Sentra</span>
                </div>
                <div class="avatar">SA</div>
            </div>
        </header>

        <section class="table-section">
            <div class="table-header">
                <div class="filter-group">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Cari ID Transaksi / Tenant...">
                    </div>
                    <select class="filter-select">
                        <option value="">Semua Status</option>
                        <option value="selesai">Selesai</option>
                        <option value="proses">Diproses</option>
                        <option value="batal">Dibatalkan</option>
                    </select>
                </div>
                <button class="btn-export">
                    <i class="fas fa-file-download"></i> Ekspor Data
                </button>
            </div>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID Transaksi</th>
                            <th>Tanggal & Waktu</th>
                            <th>Nama Tenant</th>
                            <th>Total Bayar</th>
                            <th>Metode</th>
                            <th>Status</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Rows rendered dynamically from localStorage 'orders' -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="../js/admin.js"></script>
    <script src="../js/admin-transaksi.js"></script>
</body>
</html>
