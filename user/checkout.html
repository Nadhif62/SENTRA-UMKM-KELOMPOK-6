<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Sentra UMKM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/User/checkout.css">
    <style>
        .address-empty-state {
            border: 1px dashed #cbd5e1;
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            color: #64748b;
        }
        .address-empty-state p {
            margin: 0 0 16px;
        }
        .btn-goto-profile {
            display: inline-block;
            background: #1EAD4C;
            color: #fff;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
        }
    </style>
</head>
<body class="checkout-body-bg">
    <div class="checkout-container">
        <div class="checkout-header-card">
            <button class="btn-circle-back-embedded" onclick="window.location.href='tenant.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <h1 class="checkout-title-embedded">Selesaikan Pesanan</h1>
        </div>

        <div class="checkout-section">
            <h3 class="checkout-section-title">
                <i class="fas fa-map-marker-alt"></i> Alamat Pengiriman
            </h3>
            
            <div class="address-type-toggle">
                <button id="btnDefaultAddress" class="address-btn active">Alamat Default</button>
                <button id="btnCustomAddress" class="address-btn">Alamat Sekarang</button>
            </div>

            <div id="addressEmptyState" class="address-empty-state" style="display: none;">
                <p>Anda belum mengatur alamat pengiriman utama.</p>
                <a href="profile.html" class="btn-goto-profile">Atur Alamat Sekarang</a>
            </div>

            <div id="addressCard" class="address-card-dummy" style="display: none;">
                <p id="addressUserDetails" class="address-details"></p>
            </div>

            <div id="customAddressContainer" style="display: none;">
                <textarea id="customAddressInput" class="custom-address-input" placeholder="Masukkan alamat pengiriman Anda saat ini secara lengkap..."></textarea>
            </div>
        </div>

        <div class="checkout-section">
            <h3 class="checkout-section-title">
                <i class="fas fa-shopping-bag"></i> Produk Yang Dibeli
            </h3>
            <div id="checkoutItemsContainer" class="checkout-items-list"></div>
        </div>

        <div class="checkout-section">
            <h3 class="checkout-section-title">
                <i class="fas fa-credit-card"></i> Metode Pembayaran
            </h3>
            <input type="hidden" id="paymentMethod" value="Transfer Bank">
            <div class="payment-methods-grid">
                <div class="payment-card active" onclick="selectPaymentMethod(this, 'Transfer Bank')">
                    <div class="payment-icon-box">
                        <i class="fas fa-university"></i>
                    </div>
                    <div class="payment-label">Transfer Bank</div>
                </div>
                <div class="payment-card" onclick="selectPaymentMethod(this, 'E-Wallet')">
                    <div class="payment-icon-box">
                        <i class="fas fa-wallet"></i>
                    </div>
                    <div class="payment-label">E-Wallet (Dana/OVO)</div>
                </div>
                <div class="payment-card" onclick="selectPaymentMethod(this, 'COD')">
                    <div class="payment-icon-box">
                        <i class="fas fa-money-bill-wave"></i>
                    </div>
                    <div class="payment-label">Bayar di Tempat (COD)</div>
                </div>
            </div>
        </div>
    </div>

    <div class="checkout-floating-bar">
        <div class="checkout-total-info">
            <span>Total Pembayaran</span>
            <strong id="checkoutTotalDisplay">Rp 0</strong>
        </div>
        <button id="btnConfirmOrder" class="btn-confirm-order" disabled>Konfirmasi Pesanan</button>
    </div>

    <script src="../js/User/checkout.js"></script>
    <script>
        function selectPaymentMethod(element, value) {
            document.querySelectorAll('.payment-card').forEach(card => card.classList.remove('active'));
            element.classList.add('active');
            document.getElementById('paymentMethod').value = value;
        }

        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('checkoutItemsContainer');
            if (container) {
                const observer = new MutationObserver((mutations) => {
                    mutations.forEach((mutation) => {
                        if (mutation.addedNodes.length > 0) {
                            const items = container.querySelectorAll('.checkout-item');
                            items.forEach(item => {
                                const p = item.querySelector('.checkout-item-info p');
                                if (p && p.textContent.includes('@')) {
                                    let parts = p.textContent.split('@');
                                    let qty = parts[0].trim();
                                    let price = parts[1].trim();
                                    p.innerHTML = `<div class="item-meta-row"><span class="qty-badge"><i class="fas fa-box"></i> ${qty}</span> <span class="price-unit">${price}/item</span></div>`;
                                }
                            });
                        }
                    });
                });
                observer.observe(container, { childList: true });
            }
        });
    </script>
</body>
</html>
