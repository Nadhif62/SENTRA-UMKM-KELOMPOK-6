<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Tenant - Sentra UMKM</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght=300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/User/detail-tenant.css">
</head>
<body class="detail-body-bg">
    <div class="detail-container">
        <header class="header-card" id="headerCard">
            <div class="banner-detail" id="detailBanner">
                <button class="btn-circle-back-embedded" id="btnBack" onclick="window.history.back()">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <div class="banner-title">
                    <h1 id="tenantName">NAMA TENANT</h1>
                </div>
            </div>
            <div class="info-bar">
                <div class="info-left">
                    <div class="info-item"><i class="far fa-clock"></i> <span id="tenantHours">Tutup: 21:00</span></div>
                    <div class="info-separator"></div>
                    <div class="info-item"><i class="fas fa-map-marker-alt"></i> <span id="tenantDistance">10 Menit dari Lokasi</span></div>
                </div>
                <div class="status-open">OPEN</div>
            </div>
            <div class="search-menu-bar-container" id="searchMenuBar">
                <div class="search-menu-bar">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="menuSearchInput" placeholder="Cari makanan atau minuman...">
                </div>
            </div>
        </header>

        <main class="detail-menu-main">
            <div class="menu-section" id="sectionMakananContainer" style="display: none;">
                <div class="section-header">
                    <div class="category-title-left">
                        <i class="fas fa-utensils"></i>
                        <span>Menu Makanan</span>
                    </div>
                </div>
                <div class="menu-list" id="makananListContainer"></div>
            </div>

            <div class="menu-section" id="sectionMinumanContainer" style="display: none;">
                <div class="section-header">
                    <div class="category-title-left">
                        <i class="fas fa-glass-martini-alt"></i>
                        <span>Menu Minuman</span>
                    </div>
                </div>
                <div class="menu-list" id="minumanListContainer"></div>
            </div>
        </main>
    </div>

    <div class="order-floating-bar">
        <button class="btn-order-action">ORDER</button>
        <div class="order-info">
            <span>Total Pembayaran</span>
            <strong id="totalPaymentDisplay">Rp 0</strong>
        </div>
    </div>
    <script src="../js/User/auth.js"></script>
    <script src="../js/User/detail-tenant.js"></script>
</body>
</html>
