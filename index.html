<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sentra UMKM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="Css/login.css">
</head>
<body>
    <div class="toast-container" id="toastContainer"></div>

    <div class="auth-container">
        <div class="auth-header">
            <i class="fa-solid fa-utensils"></i>
            <h2 id="auth-title">Masuk</h2>
            <p id="auth-subtitle">Selamat datang kembali di Sentra UMKM</p>
        </div>

        <!-- FORM LOGIN -->
        <div id="login-form-section">
            <form id="loginForm">
                <div class="form-group">
                    <label for="login-email">Email</label>
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="login-email" placeholder="Masukkan email Anda" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Kata Sandi</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="login-password" placeholder="Masukkan kata sandi" required>
                </div>
                <button type="submit" class="btn-submit">Masuk</button>
            </form>
            <div class="auth-footer">
                Belum punya akun? <a onclick="toggleForm('register')">Daftar di sini</a>
            </div>
        </div>

        <!-- FORM DAFTAR -->
        <div id="register-form-section">
            <form id="registerForm">
                <div class="form-group">
                    <label for="reg-name">Nama Lengkap</label>
                    <i class="fas fa-user"></i>
                    <input type="text" id="reg-name" placeholder="Nama lengkap Anda" required>
                </div>
                <div class="form-group">
                    <label for="reg-email">Email</label>
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="reg-email" placeholder="Email aktif Anda" required>
                </div>
                <div class="form-group">
                    <label for="reg-password">Kata Sandi</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="reg-password" placeholder="Buat kata sandi (Min. 6 Karakter)" required>
                </div>
                <button type="submit" class="btn-submit">Daftar Akun</button>
            </form>
            <div class="auth-footer">
                Sudah punya akun? <a onclick="toggleForm('login')">Masuk di sini</a>
            </div>
        </div>
    </div>
</body>
<script src="js/login.js"></script>
</html>
